name: Release Binaries

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-and-attach:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: bun-linux-x64
            asset: economiacasera
          - os: windows-latest
            target: bun-windows-x64
            asset: economiacasera.exe
          - os: macos-latest
            target: bun-darwin-arm64
            asset: economiacasera-mac

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: |
          bun install
          cd frontend
          bun install

      - name: Build frontend
        run: cd frontend && bun run build

      - name: Compile executable
        run: bun build --compile --minify --sourcemap --target=${{ matrix.target }} --define APP_VERSION='"${{ github.event.release.tag_name }}"' src/server.ts --outfile dist/release/${{ matrix.asset }}

      - name: Copy frontend assets
        shell: bash
        run: |
          mkdir -p dist/release/dist
          cp -r dist/assets dist/release/dist/ || true
          cp dist/index.html dist/release/dist/ || true

      - name: Upload asset to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: dist/release/${{ matrix.asset }}
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
