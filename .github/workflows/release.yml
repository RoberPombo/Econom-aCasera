name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  build-and-release:
    if: github.event.repository.fork == false
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: bun-linux-x64
            asset: economiacasera
          - os: windows-latest
            target: bun-windows-x64
            asset: economiacasera.exe
          - os: macos-latest
            target: bun-darwin-arm64
            asset: economiacasera-mac

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: |
          bun install
          cd frontend
          bun install

      - name: Build frontend
        run: cd frontend && bun run build

      - name: Compile executable
        run: bun build --compile --minify --sourcemap --target=${{ matrix.target }} --define APP_VERSION='"1.0.${{ github.run_number }}"' src/server.ts --outfile dist/release/${{ matrix.asset }}

      - name: Copy frontend assets
        shell: bash
        run: |
          mkdir -p dist/release/dist
          cp -r dist/assets dist/release/dist/ || true
          cp dist/index.html dist/release/dist/ || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/release/
          retention-days: 1

  release:
    needs: build-and-release
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Release v1.0.${{ github.run_number }}
          generate_release_notes: true
          files: |
            artifacts/economiacasera/economiacasera
            artifacts/economiacasera.exe/economiacasera.exe
            artifacts/economiacasera-mac/economiacasera-mac
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
